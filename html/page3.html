<!DOCTYPE html>
<html lang = "vi">
        <head> 
                <title>Thông tin cá nhân</title>
                <meta charset = "utf-8">
				<link rel="stylesheet" href="../css/style3.css">
        </head>
        <body>
              <div class="container">
        <form id="frmRegister">
            <h3 class="title">Đăng ký hội viên CLB</h3>
            <div class="form-group">
                <label class="label">Họ và tên:</label>
                <input class="form-control" type="text" name="fullname">
            </div>

            <div class="form-group">
                <label class="label">Lớp:</label>
                <select class="form-control" type="text" name="class">
                       <option>-- Chọn lớp --</option>
                       <option>DA24TTA</option>
                       <option>DA24TTB</option>
                       <option>DA24TTC</option>
                       <option>DA24TTD</option>
                </select>
            </div>

            <div class="form-group">
                <label class="label">Mã số sinh viên:</label>
                <input class="form-control" type="text" name="Mssv">
            </div>

            <div class="form-group">
              <label class="label">Giới tính:</label>
            <div>
              <label><input type="radio" name="gender"> Nam</label>
              <label style="margin-left:15px;"><input type="radio" name="gender"> Nữ</label>
              <label style="margin-left:15px;"><input type="radio" name="gender"> Khác</label>
         </div>
    </div>
        
           <div class="form-group">
                <label class="label">Ngày sinh:</label>
                <input class="form-control" type="text" name="ngaysinh">
            </div>

            <div class="form-group">
                <label class="label">Email:</label>
                <input class="form-control" type="email" name="email">
            </div>

            <div class="form-group">
                <label class="label">Số điện thoại:</label>
                <input class="form-control" type="text" name="phone">
            </div>

            <div class="form-group">
                <label class="label">Mật khẩu:</label>
                <input class="form-control" type="password" name="password">
            </div>

            <div class="form-group">
                <label class="label">Xác nhận mật khẩu:</label>
                <input class="form-control" type="password" name="confirm">
            </div>

            <input class="button" type="submit" value="Đăng ký">
                  </form>
              </div>
        </body>
</html>
