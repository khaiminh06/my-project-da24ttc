<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Thiết kế form</title>
    <link rel="stylesheet" href="../css/style4.css">
</head>

<body>
<div class="container">
      <table border ="1">
        <caption>HÓA ĐƠN MUA HÀNG</caption>
        <tr>
            <th>Tên sản phẩm</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>
        <tr>
            <td>A</td>
            <td class ="sl">3</td>
            <td class="dg">1000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <td>B</td>
            <td class ="sl">4</td>
            <td class="dg">2000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <td>C</td>
            <td class ="sl">5</td>
            <td class="dg">3000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <td>D</td>
            <td class ="sl">6</td>
            <td class="dg">4000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <td>E</td>
            <td class ="sl">7</td>
            <td class="dg">6000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <td colspan="3">Tổng thanh toán</td>
            <td id="kq"></td>
        </tr>
        </table>
</div>
      <script>
           const soluong= document.getElementsByClassName("sl");
           const dongia=document.getElementsByClassName("dg");
           const thanhtien=document.getElementsByClassName("tt");
           let tongthanhtoan =0;
           //duyet qua moi dong
           for(let i=0; i<soluong.length; i++)
           {
               thanhtien[i].innerHTML =soluong[i].innerHTML * dongia[i].innerHTML
               tongthanhtoan += parseInt(thanhtien[i].innerHTML);
           }
               document.getElementById("kq").innerHTML
                                     =tongthanhtoan;
      </script>
</body>
</html>
